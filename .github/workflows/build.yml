name: Build Application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-14 and macos-latest are Apple Silicon (ARM64) runners on GitHub Actions
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.3'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --name SessionWriter --onefile --windowed main.py

    - name: Zip Artifact (macOS)
      if: matrix.os == 'macos-14'
      run: |
        cd dist
        zip -r SessionWriter-macOS-arm64.zip SessionWriter.app SessionWriter

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SessionWriter-${{ matrix.os }}
        path: |
          dist/SessionWriter*
          dist/*.exe
          !dist/*.app
        retention-days: 1
        if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create or Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        name: "Latest Main Build"
        tag_name: "latest"
        files: |
          artifacts/**/*
        make_latest: true
